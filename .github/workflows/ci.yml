name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  checks:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        id: lint
        run: pnpm lint 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Format check
        id: format
        run: pnpm format:check 2>&1 | tee format-output.txt
        continue-on-error: true

      - name: Type check
        id: typecheck
        run: pnpm type-check 2>&1 | tee typecheck-output.txt
        continue-on-error: true

      - name: Build
        id: build
        run: pnpm generate 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const status = (outcome) => outcome === 'success' ? '✅' : '❌';

            const readOutput = (file) => {
              try {
                const content = fs.readFileSync(file, 'utf8').trim();
                return content.length > 0 ? content : null;
              } catch {
                return null;
              }
            };

            const lintStatus     = '${{ steps.lint.outcome }}';
            const formatStatus   = '${{ steps.format.outcome }}';
            const typecheckStatus = '${{ steps.typecheck.outcome }}';
            const buildStatus    = '${{ steps.build.outcome }}';

            const allPassed = [lintStatus, formatStatus, typecheckStatus, buildStatus]
              .every(s => s === 'success');

            const errorBlock = (output) => output
              ? `\n<details><summary>Ver error</summary>\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\`\n</details>`
              : '';

            const lintOut     = lintStatus     !== 'success' ? readOutput('lint-output.txt')      : null;
            const formatOut   = formatStatus   !== 'success' ? readOutput('format-output.txt')    : null;
            const typecheckOut = typecheckStatus !== 'success' ? readOutput('typecheck-output.txt') : null;
            const buildOut    = buildStatus    !== 'success' ? readOutput('build-output.txt')     : null;

            const header = allPassed
              ? '## ✅ CI passed — all checks green'
              : '## ❌ CI failed — review the errors below';

            const body = `${header}

            | Check | Status |
            |---|---|
            | Lint | ${status(lintStatus)} |
            | Format | ${status(formatStatus)} |
            | Type check | ${status(typecheckStatus)} |
            | Build | ${status(buildStatus)} |
            ${lintOut     ? `\n**Lint errors:**${errorBlock(lintOut)}`           : ''}
            ${formatOut   ? `\n**Format errors:**${errorBlock(formatOut)}`       : ''}
            ${typecheckOut ? `\n**Type check errors:**${errorBlock(typecheckOut)}` : ''}
            ${buildOut    ? `\n**Build errors:**${errorBlock(buildOut)}`         : ''}
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('CI passed') ||
              c.user.login === 'github-actions[bot]' && c.body.includes('CI failed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if any check failed
        if: |
          steps.lint.outcome == 'failure' ||
          steps.format.outcome == 'failure' ||
          steps.typecheck.outcome == 'failure' ||
          steps.build.outcome == 'failure'
        run: exit 1
